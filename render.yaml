services:
  - type: worker
    name: telegram-gif-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # Set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
